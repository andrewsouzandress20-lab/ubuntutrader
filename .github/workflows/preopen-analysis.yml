name: Pre-Open Analysis & Signal

on:
  # 14:30 UTC → 10:30 Manaus (UTC-4 atual) / 11:30 BRT. Apenas dias úteis (seg–sex).
  schedule:
    - cron: '30 14 * * 1-5'
  # Permite disparo manual para testes
  workflow_dispatch:

jobs:
  pre-open-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar dependencias Python (TradingView)
        run: |
          python3 -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Coletar indices TradingView (prioridade)
        run: python3 fetch_indices_tradingview.py

      - name: Coletar empresas TradingView (breadth)
        run: python3 fetch_companies_tradingview.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npx tsc

      - name: Coletar snapshot pré-abertura
        run: node dist/scripts/collect_snapshot.js preopen

      - name: Enviar análise (pré-abertura) para Telegram
        env:
          TARGET_ASSETS: US30
          VITE_TELEGRAM_BOT_TOKEN: ${{ secrets.VITE_TELEGRAM_BOT_TOKEN }}
          VITE_TELEGRAM_CHAT_ID: ${{ secrets.VITE_TELEGRAM_CHAT_ID }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
        run: node dist/send_signals_action.js preopen analysis
