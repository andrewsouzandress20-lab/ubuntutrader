name: Pre-Open Analysis & Signal

on:
  # Dispara assim que a coleta TradingView das 11h30 BRT terminar (prioridade TradingView)
  workflow_run:
    workflows: ["Coleta TradingView Agendada"]
    types: [completed]
  # Permite disparo manual para testes
  workflow_dispatch:

jobs:
  pre-open-analysis:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar dependencias Python (TradingView)
        run: |
          python3 -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Coletar indices TradingView (prioridade)
        run: python3 fetch_indices_tradingview.py

      - name: Baixar snapshot TradingView da coleta
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: snapshots
          path: tradingview_snapshot
          run-id: ${{ github.event.workflow_run.id }}

      - name: Disponibilizar snapshot TradingView
        run: |
          cp tradingview_snapshot/indices_snapshot.json . 2>/dev/null || true
          cp tradingview_snapshot/companies_snapshot.json . 2>/dev/null || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npx tsc

      - name: Coletar snapshot pré-abertura
        run: node dist/scripts/collect_snapshot.js preopen

      - name: Enviar análise para Telegram
        env:
          TARGET_ASSETS: US30
          VITE_TELEGRAM_BOT_TOKEN: ${{ secrets.VITE_TELEGRAM_BOT_TOKEN }}
          VITE_TELEGRAM_CHAT_ID: ${{ secrets.VITE_TELEGRAM_CHAT_ID }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
        run: node dist/send_signals_action.js preopen analysis
