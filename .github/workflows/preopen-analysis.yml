name: Pre-Open Analysis & Signal

on:
  # Disparo manual
  workflow_dispatch:
  # Disparo externo via repository_dispatch (cron externo: cron-job.org, Workers)
  repository_dispatch:
    types: [preopen-trigger]

jobs:
  pre-open-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar dependencias Python (TradingView)
        run: |
          python3 -m pip install --upgrade pip

      - name: Coletar indices TradingView (prioridade)
        run: python3 fetch_indices_tradingview.py


      - name: Listar arquivos do diretório (debug)
        run: ls -lh .

      - name: Garantir companies_snapshot.json no dist/
        run: |
          cp companies_snapshot.json dist/ || true
          cp companies_snapshot.json public/ || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build scripts TypeScript
        run: npx tsc --project tsconfig.scripts.json

      - name: Coletar snapshot pré-abertura
        run: node dist/scripts/collect_snapshot.js preopen

      - name: Enviar análise (pré-abertura) para Telegram
        env:
          TARGET_ASSETS: US30
          VITE_TELEGRAM_BOT_TOKEN: ${{ secrets.VITE_TELEGRAM_BOT_TOKEN }}
          VITE_TELEGRAM_CHAT_ID: ${{ secrets.VITE_TELEGRAM_CHAT_ID }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
        run: node dist/send_signals_action.js preopen analysis
