name: Scheduler Signals

on:
  schedule:
    # US30: segunda a sexta às 13:30 UTC
    - cron: '30 13 * * 1-5'
    # HK50: domingo a quinta às 01:30 UTC
    - cron: '30 1 * * 0-4'

jobs:
  send-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Coletar snapshot 15min antes
        if: github.event.schedule == '15 13 * * 1-5' || github.event.schedule == '15 1 * * 0-4'
        run: npx ts-node scripts/collect_snapshot.ts preopen

      - name: Coletar snapshot na abertura
        if: github.event.schedule == '30 13 * * 1-5' || github.event.schedule == '30 1 * * 0-4'
        run: npx ts-node scripts/collect_snapshot.ts open

      - name: Enviar sinal usando snapshot
        if: github.event.schedule == '30 13 * * 1-5' || github.event.schedule == '30 1 * * 0-4'
        run: npx ts-node send_signals_action.ts open
        env:
          VITE_TELEGRAM_BOT_TOKEN: ${{ secrets.VITE_TELEGRAM_BOT_TOKEN }}
          VITE_TELEGRAM_CHAT_ID: ${{ secrets.VITE_TELEGRAM_CHAT_ID }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
