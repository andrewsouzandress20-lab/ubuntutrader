name: Coleta TradingView Agendada

on:
  schedule:
    # US30 - 11:30 BRT (14:30 UTC) segunda a sexta
    - cron: '30 14 * * 1-5'
    # HK50 - 21:30 BRT (00:30 UTC) segunda a sexta
    - cron: '30 0 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-indices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      - name: Instalar dependências Python
        run: |
          python3 -m pip install --upgrade pip
          pip install requests beautifulsoup4
      - name: Coletar índices TradingView
        run: python3 fetch_indices_tradingview.py
      - name: Gerar companies_snapshot.json a partir do CSV
        run: python3 csv_to_companies_snapshot.py
      - name: Upload arquivos de snapshot
        uses: actions/upload-artifact@v4
        with:
          name: snapshots
          path: |
            indices_snapshot.json
            companies_snapshot.json
            public/indices_snapshot.json
            public/companies_snapshot.json
