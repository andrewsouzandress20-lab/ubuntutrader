
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC FVG Pro - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700;800&display=swap');
        
        body {
            background-color: #020617;
            color: #f8fafc;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        #root {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .jetbrains { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom scrollbar */
        
        ::-webkit-scrollbar { width: 6px; height: 4px; }
        
        ::-webkit-scrollbar-track { background: #0f172a; }
        
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* Hide scrollbar for specific classes */
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Animation for live dot */
        
        @keyframes pulse-custom {
          0% { transform: scale(0.95); opacity: 0.7; }
          50% { transform: scale(1.1); opacity: 1; }
          100% { transform: scale(0.95); opacity: 0.7; }
        }
        
        .animate-pulse-slow { animation: pulse-custom 2s infinite ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>
</div>
</body>
</html>
